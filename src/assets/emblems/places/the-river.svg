<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="The river: clear water running over enormous polished stones like prehistoric eggs">
  <rect x="4" y="4" width="232" height="172" rx="2" stroke-width="1"/>
  <rect x="9" y="9" width="222" height="162" rx="1" stroke-width="0.5"/>
  <!-- far bank -->
  <path d="M16 52 C70 46 170 46 224 52" stroke-width="0.75"/>
  <path d="M30 44 C34 40 40 40 44 44 M186 42 C190 38 196 38 200 42" stroke-width="0.75"/>
  <!-- water lines -->
  <g stroke-width="0.75">
    <path d="M16 70 C60 66 120 68 158 70 M196 72 C206 70 216 70 224 71"/>
    <path d="M16 96 C36 93 52 94 66 96 M148 98 C176 95 204 96 224 98"/>
    <path d="M16 128 C30 125 40 126 52 128 M108 132 C130 128 150 129 166 132"/>
    <path d="M60 152 C90 148 140 148 180 152"/>
  </g>
  <!-- the stones: monumental ovoids -->
  <ellipse cx="72" cy="90" rx="30" ry="17" stroke-width="2"/>
  <ellipse cx="168" cy="86" rx="26" ry="15" stroke-width="2"/>
  <ellipse cx="120" cy="122" rx="36" ry="20" stroke-width="2"/>
  <ellipse cx="36" cy="128" rx="18" ry="11" stroke-width="2"/>
  <ellipse cx="204" cy="126" rx="19" ry="12" stroke-width="2"/>
  <ellipse cx="120" cy="60" rx="17" ry="9" stroke-width="1.5"/>
  <!-- form hatching on the big stone -->
  <g stroke-width="0.75">
    <path d="M96 132 C104 138 128 140 142 134"/>
    <path d="M92 128 C102 134 130 136 146 130"/>
    <path d="M56 100 C64 104 80 105 90 101"/>
  </g>
  <!-- highlight on the great stone: accent stroke -->
  <path d="M100 110 C106 105 118 103 128 106" stroke="var(--em-accent, #f2b705)" stroke-width="2"/>
  <!-- eddies around stones -->
  <path d="M42 92 C38 94 36 98 38 102 M198 90 C194 92 192 96 194 100 M84 144 C88 148 96 150 102 148" stroke-width="0.75"/>
  <g fill="currentColor" stroke="none">
    <circle cx="58" cy="112" r="0.7"/>
    <circle cx="150" cy="106" r="0.7"/>
    <circle cx="180" cy="144" r="0.7"/>
    <circle cx="70" cy="150" r="0.7"/>
  </g>
</svg>
